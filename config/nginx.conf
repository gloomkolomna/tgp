events {
    worker_connections 1024;
}

stream {
    upstream mtproto {
        server mtproto-proxy:443;
    }

    server {
        listen 443 ssl;
        proxy_pass mtproto;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
    }
}
