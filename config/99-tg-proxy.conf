# =====================================================================
# MTProto proxy: kernel tuning for lossy / mobile (LTE) networks.
# Sized for a SMALL server: 1 vCPU, 1 GB RAM, ~5 users.
# /etc/sysctl.d/99-tg-proxy.conf   |   applied by scripts/sysctl-apply.sh
#
# Design: keep the LTE-critical wins (BBR, MTU-probing, no slow-start reset)
# but do NOT over-allocate buffers / conntrack slots — on 1 GB RAM a burst of
# scan connections could otherwise balloon memory and trigger OOM.
# =====================================================================

# --- Congestion control: BBR instead of default cubic ---------------
# cubic backs off hard on every packet loss; on LTE that means the link
# spends most of its time recovering. BBR estimates bandwidth/RTT and
# keeps sending through losses -> drastically better throughput on mobile.
# Requires the tcp_bbr module (auto-loaded by sysctl-apply.sh).
net.core.default_q_disc         = fq
net.ipv4.tcp_congestion_control = bbr
net.ipv4.tcp_available_congestion_control = bbr cubic reno

# --- Socket buffers (modest — 1 GB RAM) ------------------------------
# Autotuned with a sane ceiling: enough to absorb bursts on a lossy path,
# not so much that a connection burst eats all RAM.
net.core.rmem_max            = 8388608
net.core.wmem_max            = 8388608
net.core.rmem_default        = 262144
net.core.wmem_default        = 262144
net.core.netdev_max_backlog  = 5000

net.ipv4.tcp_rmem            = 4096 87380 8388608
net.ipv4.tcp_wmem            = 4096 65536 8388608

# --- Reliability over lossy links -----------------------------------
# Do NOT reset cwnd to the start after an idle period or an RTO:
# on LTE the connection would otherwise spend time re-climbing every time.
net.ipv4.tcp_slow_start_after_left = 0

# Detect path MTU dynamically. Fixes "MTU black holes" where large data
# packets (media, long messages) silently disappear while small handshake
# packets pass -> "connected but nothing arrives" on LTE.
net.ipv4.tcp_mtu_probing     = 1

# TCP Fast Open (client + server) — saves one RTT on connection setup.
net.ipv4.tcp_fastopen        = 3

# Enable window scaling / timestamps / SACK (usually on already).
net.ipv4.tcp_window_scaling  = 1
net.ipv4.tcp_timestamps      = 1
net.ipv4.tcp_sack            = 1
net.ipv4.tcp_fack            = 1
net.ipv4.tcp_ecn             = 0

# --- TCP keepalive intervals (kernel defaults; see note in README) ---
# These only take effect on sockets that set SO_KEEPALIVE. They are also
# consumed by nf_conntrack for the ESTABLISHED-state timeout logic.
net.ipv4.tcp_keepalive_time    = 60
net.ipv4.tcp_keepalive_intvl   = 10
net.ipv4.tcp_keepalive_probes  = 6

# --- conntrack (only when module is loaded) --------------------------
# Small but adequate for ~5 users. A shorter established-state timeout helps
# reap "zombie" connections left by mobile NAT, so clients reconnect cleanly
# instead of sending messages into a void ("connected but stuck").
net.netfilter.nf_conntrack_tcp_timeout_established = 7200
net.netfilter.nf_conntrack_tcp_timeout_time_wait   = 30
net.netfilter.nf_conntrack_max                     = 10000

# --- misc: free orphan sockets faster, don't swap aggressively -------
# Drop orphaned sockets quickly to protect RAM on a 1 GB box; the last
# number is the hard limit in packets (low on purpose for a tiny server).
net.ipv4.tcp_orphan_retries  = 1
net.ipv4.tcp_max_orphans     = 1024
# Swap little: prefer keeping app code in RAM (Erlang is sensitive to swap).
vm.swappiness               = 10
