services:
  mtproto-proxy:
    image: seriyps/mtproto-proxy:latest
    container_name: tg-proxy
    restart: unless-stopped

    network_mode: host
    mem_limit: 384m
    memswap_limit: 640m
    init: true

    command: "-p 443 -s ${SECRET} -t 00000000000000000000000000000000 -a tls"

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
