services:
  mtproto-proxy:
    image: ghcr.io/sleep3r/mtproto.zig:latest
    container_name: tg-proxy
    restart: unless-stopped
    ports:
      - "443:443/tcp"
    volumes:
      - ./config/mtproto.toml:/etc/mtproto-proxy/config.toml:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
