services:
  mtproto-proxy:
    image: alexbers/mtprotoproxy:latest
    container_name: tg-proxy
    restart: unless-stopped
    ports:
      - "443:443/tcp"
    volumes:
      - ./config/config.py:/app/config.py:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
