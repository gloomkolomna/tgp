services:
  mtproto-proxy:
    image: seriyps/mtproto-proxy:latest
    container_name: tg-proxy
    restart: unless-stopped
    ports:
      - "443:443/tcp"
    environment:
      - MTP_PORT=443
      - MTP_SECRET=${SECRET}
      - MTP_TLS_ONLY=1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
